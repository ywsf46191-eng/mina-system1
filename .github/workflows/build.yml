
name: Electron Build and Release
 
on:
  push:
    branches:
      - main
 
permissions:
  contents: write
 
jobs:
  build:
    runs-on: windows-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
 
      - name: Install dependencies
        run: npm install
 
      - name: Install missing PostCSS plugins
        run: npm install autoprefixer --save-dev
 
      - name: Fix PostCSS config (remove .js version to avoid ESM conflict)
        run: del postcss.config.js
        shell: cmd
 
      - name: Generate Icon
        run: npm run generate:icon
 
      - name: Web App Build
        run: npm run build
 
      - name: Electron Build
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
 
      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Release v1.0.${{ github.run_number }}"
          files: dist-electron/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
 
