
name: Deploy Web Preview to GitHub Pages
 
on:
  push:
    branches:
      - main
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: true
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
 
      - name: Install dependencies
        run: npm install
 
      - name: Install missing PostCSS plugins
        run: npm install autoprefixer --save-dev
 
      - name: Fix PostCSS config (remove .js version to avoid ESM conflict)
        run: rm -f postcss.config.js
 
      - name: Generate Icon
        run: npm run generate:icon
 
      - name: Build for Web (override base path for GitHub Pages subfolder)
        run: npx vite build --base=/mina-system1/
 
      - name: Setup Pages
        uses: actions/configure-pages@v5
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
 
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
 
